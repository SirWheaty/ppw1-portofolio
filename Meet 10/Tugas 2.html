<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validasi Praktikan PPW1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 50px; background-color: #f8f9fa; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="container shadow-sm">
        <h2 class="text-center mb-4">Status Praktikan</h2>
        <div id="output">
            <!-- Hasil akan muncul di sini -->
        </div>
    </div>

    <script>
        // 1. Menanyakan apakah praktikan PPW1
        let isPraktikan = confirm("Apakah Anda praktikan PPW1?");

        let outputDiv = document.getElementById("output");

        if (isPraktikan) {
            // 2. Jika iya, tanya Nama, NIM, Angkatan
            let nama = prompt("Masukkan Nama Anda:");
            let nim = prompt("Masukkan NIM Anda:");
            let angkatan = prompt("Masukkan Angkatan Anda:");

            // 3. Tampilkan dalam tabel Bootstrap
            outputDiv.innerHTML = `
                <div class="alert alert-success">Selamat Datang, Praktikan!</div>
                <table class="table table-bordered table-striped mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Kategori</th>
                            <th>Data Mahasiswa</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>Nama</td><td>${nama}</td></tr>
                        <tr><td>NIM</td><td>${nim}</td></tr>
                        <tr><td>Angkatan</td><td>${angkatan}</td></tr>
                    </tbody>
                </table>
            `;
        } else {
            // 4. Jika tidak, tampilkan pesan penolakan
            outputDiv.innerHTML = `
                <div class="alert alert-danger text-center fw-bold">
                    Anda bukan praktikan PPW1, anda tidak boleh masuk!
                </div>
            `;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
