<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 800px;">
            <h2 class="mb-4 text-center">Formulir Pendaftaran</h2>

            <!-- Alert (Hidden by Default) -->
            <div class="alert alert-success alert-dismissible fade show d-none" id="successAlert" role="alert">
                Pendaftaran berhasil disimpan!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form>
                <!-- 2 Kolom Data Diri -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control is-valid" value="Athar" required>
                        <div class="valid-feedback">Nama valid!</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">NIM</label>
                        <input type="text" class="form-control is-invalid" placeholder="Masukkan NIM" required>
                        <div class="invalid-feedback">NIM tidak boleh kosong.</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="email@example.com">
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Program Studi</label>
                        <select class="form-select">
                            <option selected>Teknologi Informasi</option>
                            <option>Sistem Informasi</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Semester</label>
                        <select class="form-select">
                            <option>Semester 2</option>
                            <option selected>Semester 4</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Alamat</label>
                    <textarea class="form-control" rows="3"></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">Foto Profil</label>
                    <input type="file" class="form-control">
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-primary px-4" onclick="document.getElementById('successAlert').classList.remove('d-none')">Simpan</button>
                    <button type="reset" class="btn btn-outline-secondary px-4">Reset</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
