<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Showcase</title>
    <link rel="stylesheet" href="lat 1.css">
</head>
<body>

    <nav class="navbar">
        <h1>My Profile Page</h1>
    </nav>

    <main class="content">
        <div class="profile-card">
            <div class="status-badge">Online 🟢</div>
            
            <div class="profile-image">
                <img src="https://picsum.photos/150" alt="User">
            </div>
            
            <div class="profile-info">
                <h3>Athar</h3>
                <p>Web Developer Student</p>
                <button class="btn">View Profile</button>
            </div>
        </div>

        <div class="spacer">
            <p>Scroll kebawah untuk melihat efek Sticky Navbar dan Fixed Button...</p>
        </div>
    </main>

    <a href="#" class="back-to-top">↑ Top</a>

</body>
</html>
